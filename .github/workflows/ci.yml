name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ pkg-config libsdl3-dev
      - name: Check scripts
        run: npm run check
      - name: Configure
        run: cmake --preset linux-debug
      - name: Build
        run: cmake --build --preset linux-debug
      - name: Test
        run: ctest --preset linux-debug
